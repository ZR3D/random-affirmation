<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Random Affirmation</title>
<style>
@font-face {
  font-family: 'Nunito';
  font-style: normal;
  font-weight: 400;
  src: url('fonts/nunito-regular.woff2') format('woff2');
}
*{box-sizing:border-box;}
body{font-family: 'Nunito', sans-serif; font-size: 13px; padding: 0; margin: 0; background-color: #E6ECFA;}
.main-container{display:flex; justify-content: center; height: 100vh; align-items: center;}
</style>
</head>
<body>
<div class="main-container">
  <div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" id="designSvg" width="800" height="800" >
      <defs>
        <style id="svg-def-style" type="text/css">
        .svg-text {
          font-family: 'Nunito', sans-serif;
          font-size: 110px;
          fill:#ffffff;
          fill-opacity:0.5;
          text-anchor:middle;
          dominant-baseline:middle;
        }
        .svg-circle {
          fill-opacity:1;
          stroke:none;
          stroke-width:0;
          transition: fill 1s ease;
          cursor: pointer;
        }
        </style>
      </defs>
      <g id="backgroundLayer"><rect id="backgroundRect" width="600" height="600" fill="#E6ECFA" /></g>
      <g id="pathLayer"></g>
      <g id="triangleLayer"></g>
      <g id="circleLayer">
      <circle id="circleBackground" cx="400" cy="400" r="380" class="svg-circle" fill="#0ea5e9"></circle>
      </g>
      <g id="textLayer">
      <text id="textLine1" x="400" y="340" class="svg-text">click circle</text>
      <text id="textLine2" x="400" y="460" class="svg-text">for audio</text>
      </g>
    </svg>
    </div>
</div>

<script>
// --- Global Declarations ---
const appData = {fillIndex:0, msgIndex:0, freqIndex:0, audio:false};
const textLine1 = document.getElementById('textLine1');
const textLine2 = document.getElementById('textLine2');
const circleBackground = document.getElementById('circleBackground');
const fill = ['#2F4760','#662646','#205C3E','#C6832E','#3CC731', '#64748b', '#6b7280', '#71717a', '#737373', '#78716c', '#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#ef4444', '#ec4899', '#f43f5e',];
const solfeggioFreqs = [396, 417, 528, 639, 741, 852, 174, 285, 963];
const messageList = [
  'ok',
  'relaxed',
  'happy',
  'peaceful',
  'still',
  'contented',
  'tranquil',
  'free',
  'calm',
  'quiet',
  'caring',
  'present',
  'healthy',
  'generous',
  'kind',
  'accepting',
  'forgiving',
  'love',
  'loving',
  'good',
  'released',
  'grateful',
  'unburdened',
  'easy',
  'floaty',
  'joyful',
  'patient',
  'compassionate',
  // From Chatty  
  'settled',
  'steady',
  'grounded',
  'centred',
  'safe',
  'supported',
  'held',
  'embraced',
  'balanced',
  'at ease',
  //Letting go / spacious
  'open',
  'spacious',
  'light',
  'clear',
  'flowing',
  'expansive',
  //Warm & emotional
  'warm',
  'connected',
  'gentle',
  'nurtured',
  'appreciative',
  'fulfilled',
  'whole',
  // Quietly uplifting
  'bright',
  'refreshed',
  'renewed',
  'uplifted',
  'inspired',
  'hopeful',
  'alive',
  'awake',
  'energised', 
  // Mindfulness / awareness
  'aware',
  'mindful',
  'attentive',
  'curious',
  'receptive',
];
const prefixes = ['','be ','feel ','become ','being '];

// --- Event Listners ---
circleBackground.addEventListener('click', toggleAudio);

// --- Helper Functions ---
function getRandomIndex(list, lastIndex){
  // Select Random
  let index = Math.floor(Math.random() * list.length);
  // Is same as last, so add 1 and use modulus to keep in bounds of list
  if(index === lastIndex){
    index = (index+1) % list.length;
  }
  return index;
}

function changeText(){
  const seconds = 4.5;
  const duration = seconds * 1000;
  appData.msgIndex = getRandomIndex(messageList, appData.msgIndex);
  appData.fillIndex = getRandomIndex(fill, appData.fillIndex);
  appData.freqIndex = getRandomIndex(solfeggioFreqs, appData.freqIndex);
  const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
  const message = messageList[appData.msgIndex];
  const fillColor = fill[appData.fillIndex];
  const messageData = {line1:prefix, line2:message, yline2:400+60}
  if((message.length + prefix.length) <= 10 || prefix===''){
    messageData.line1 = '';
    messageData.line2 = prefix + message;
    messageData.yline2 = 400;
  }
  // Update Dom
  textLine1.innerHTML = messageData.line1;
  textLine2.innerHTML = messageData.line2;
  textLine2.setAttribute('y', messageData.yline2); 
  circleBackground.style.fill = fillColor;
  // Sound
  const frequency = solfeggioFreqs[appData.freqIndex];
  playTone(frequency, ctx.currentTime, seconds+4);
  // Loop
  const timeout = setTimeout(changeText, duration);
}

// --- Audio ---
const ctx = new (window.AudioContext || window.webkitAudioContext)();

// Master gain to control overall volume
const master = ctx.createGain();
master.gain.value = 0.05; // nice and gentle
master.connect(ctx.destination);

// Function to play a single tone with smooth fade in/out
function playTone(freq, startTime, duration) {
  if(!appData.audio) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(0.8, startTime + 2); // fade in 2s
  gain.gain.linearRampToValueAtTime(0.0, startTime + duration - 2); // fade out last 2s
  osc.frequency.value = freq;
  osc.type = 'triangle';
  osc.connect(gain).connect(master);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function toggleAudio(){
  appData.audio = !appData.audio;
  // Play default for feedback
  playTone(solfeggioFreqs[0], ctx.currentTime, 8);
}

function init(){
  setTimeout(changeText, 4000);
}

init();

/*
Notes:
Original Six Frequencies
396 Hz: Liberating Guilt and Fear
417 Hz: Undoing Situations and Facilitating Change
528 Hz: Transformation and Miracles (DNA Repair)
639 Hz: Connecting and Relationships
741 Hz: Expression and Solutions
852 Hz: Returning to Spiritual Order
Modern Expanded
174 Hz: Relieving pain and stress.
285 Hz: Healing tissue and organs.
963 Hz: Awakening perfect state/pineal activation.
*/
</script>
</body>
</html>
