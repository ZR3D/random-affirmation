<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Random Affirmation</title>
<style>
*{box-sizing:border-box;}
body { font-family: Lato, sans-serif; font-size: 13px; padding: 0; margin: 0; background-color: #E6ECFA;}
.main-container{display:flex; justify-content: center; height: 100vh; align-items: center;}
.main-container div{}
</style>
</head>

<body>
<div class="main-container">
  <div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" id="designSvg" width="800" height="800" >
      <defs>
        <style id="svg-def-style" type="text/css">
          .svg-text {
            font-family: Lato, sans-serif; 
            font-size: 110px; 
            fill:#ffffff;
            fill-opacity:0.5;
            text-anchor:middle;
            dominant-baseline:middle;
            }
          .svg-circle {
            fill-opacity:1; 
            stroke:none; 
            stroke-width:0; 
            transition: fill 0.5s ease;
           }
          .hidden{display:none;}
        </style>
      </defs>
      <g id="backgroundLayer"><rect id="backgroundRect" width="600" height="600" fill="#E6ECFA" /></g>
      <g id="pathLayer"></g>
      <g id="triangleLayer"></g>
      <g id="circleLayer">
      <circle id="circleBackground" cx="400" cy="400" r="380" class="svg-circle" fill="#0ea5e9"></circle>
      </g>
      <g id="textLayer">
      <text id="textMessage" x="400" y="400" class="svg-text">peace</text>
      </g>
    </svg>
    </div>
</div>

<script>
const textMessage = document.getElementById('textMessage');
const circleBackground = document.getElementById('circleBackground');
const fill = ['#123456','#561234','#125634','#C6832E','#3CC731', '#64748b', '#6b7280', '#71717a', '#737373', '#78716c', '#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#ef4444', '#ec4899', '#f43f5e',];
const messageList = [
  'ok',
  'relaxed',
  'happy',
  'peace',
  'content',
  'tranquil',
  'free',
  'calm',
  'caring',
  'present',
  'healthy',
  'generous',
  'kind',
  'accepting',
  'forgiving',
  'love',  
  'good',
  'released',
  'grateful', 
  'unburdened',
  'easy',
  'floaty',
  'joyful',
  'patient',
  'compassionate',
];
const prefixes = ['','be ','feel ']
function changeText(){
  const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
  const message = messageList[Math.floor(Math.random() * messageList.length)];
  textMessage.innerHTML = prefix + message;
  const fillIndex = Math.floor(Math.random() * fill.length);  
  const fillColor = fill[fillIndex];
  //circleBackground.setAttribute('fill', fillColor);
  circleBackground.style.fill = fillColor;  
  const timeout = setTimeout(changeText, 2000);
}

function init(){  
  changeText();  
}

init();
</script>
</body>
</html>
